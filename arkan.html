<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арқан Тартыс</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" src="bgm.mp3" loop></audio>
    <div id="spinning-pattern"></div>
    <div id="rotate-screen" class="rotate-overlay"><div class="rotate-icon">📱</div><h2>Бұрыңыз / Поверните экран</h2></div>

    <div id="arkan-screen" class="screen">
        <button class="home-btn" onclick="app.goHome()">🏠 Меню</button>
        <div class="arkan-layout">
            <div class="arkan-zone p1-color">
                <h2 id="at-team-a">Игрок 1</h2>
                <div class="timer-container" id="at-timer-box"><div class="timer-bar" id="at-timer"></div></div>
                <div class="arkan-q-box" id="at-q-a">?</div>
                <div class="arkan-options" id="at-opt-a"></div>
            </div>
            <div class="arkan-arena">
                <div class="center-line"></div>
                <div id="rope-marker" class="rope-marker"></div>
            </div>
            <div class="arkan-zone p2-color">
                <h2 id="at-team-b">Игрок 2</h2>
                <div class="ai-status" id="at-ai-status">🤖 ИИ ждет ошибку...</div>
                <div id="at-p2-controls" style="display:flex; flex-direction:column; flex:1; justify-content: center;">
                    <div class="arkan-q-box" id="at-q-b">?</div>
                    <div class="arkan-options" id="at-opt-b"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="winner-text" style="color:var(--blue); font-size: 1.5rem; margin-bottom: 15px;">Победа!</h2>
            <button onclick="app.restartCurrentGame()" style="padding: 10px 20px; font-size: 1rem; background: var(--gold); border:none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px;">Рестарт</button>
            <button onclick="app.goHome()" style="padding: 10px 20px; font-size: 1rem; background: #eee; border: none; border-radius: 8px; cursor: pointer; width: 100%;">Меню</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
