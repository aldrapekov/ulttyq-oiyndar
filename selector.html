<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULY DALA OYINDARY - Случайный Ученик</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --blue: #00B1C1; --gold: #FFDA44; --red: #E30A17; --white: #ffffff;
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', serif; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .main-container { text-align: center; z-index: 10; background: rgba(255,255,255,0.9); padding: 40px; border-radius: 20px; border: 4px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: opacity 0.5s; }
        .main-title { color: var(--blue); font-size: 2.5rem; text-transform: uppercase; margin-bottom: 30px; }
        
        .action-btn { padding: 15px 40px; font-size: 1.2rem; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; background-color: var(--blue); box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: 0.1s; }
        .action-btn:active { transform: translateY(3px); box-shadow: none; }
        .action-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* ОКНО КАМЕРЫ */
        #camera-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: black; z-index: 100; justify-content: center; align-items: center; }
        #video-element { height: 80vh; border: 5px solid var(--gold); border-radius: 15px; }
        /* Холст для рисования квадратов вокруг лиц */
        #overlay-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 80vh; pointer-events: none; }

        /* ОКНО РЕЗУЛЬТАТА */
        #result-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #final-photo { border: 10px solid var(--gold); border-radius: 15px; max-width: 80vw; max-height: 70vh; margin-bottom: 20px; box-shadow: 0 0 50px rgba(255,218,68,0.5); }
        .result-text { color: var(--gold); font-size: 3rem; font-weight: bold; text-transform: uppercase; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #close-result { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: white; cursor: pointer; background: none; border: none;}
    </style>
</head>
<body>

    <div class="main-container" id="main-menu">
        <h1 class="main-title">ULY DALA OYINDARY</h1>
        <h2>Выбор случайного ученика</h2>
        <p>Нажмите кнопку, загрузится нейросеть, затем учитель направит камеру на класс.<br>Ученик будет выбран автоматически.</p>
        <button class="action-btn" id="start-picker" onclick="randomPicker.init()">Запустить Случайный Выбор</button>
        <p id="status-text" style="color:var(--red); font-weight:bold;"></p>
    </div>

    <div id="camera-screen">
        <video id="video-element" autoplay muted></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <div id="result-screen">
        <button id="close-result" onclick="randomPicker.hideResult()">×</button>
        <img id="final-photo" src="" alt="Фото победителя">
        <div class="result-text">выходит к доске!</div>
    </div>

<script>
    /**
     * ULY DALA OYINDARY: Random Student Picker
     * Использует face-api.js для обнаружения лиц в браузере.
     */
    const randomPicker = {
        video: document.getElementById('video-element'),
        canvas: document.getElementById('overlay-canvas'),
        mainMenu: document.getElementById('main-menu'),
        camScreen: document.getElementById('camera-screen'),
        resScreen: document.getElementById('result-screen'),
        startBtn: document.getElementById('start-picker'),
        status: document.getElementById('status-text'),
        photo: document.getElementById('final-photo'),
        
        isDetecting: false,
        detectionLoop: null,
        modelsLoaded: false,

        /**
         * 1. Инициализация: Загрузка моделей и проверка камеры
         */
        async init() {
            if (this.modelsLoaded) {
                this.startCamera();
                return;
            }

            this.startBtn.disabled = true;
            this.status.innerText = "⏳ Загрузка нейросети... Пожалуйста, подождите.";

            try {
                // ПУТЬ К ВАШЕЙ ПАПКЕ MODELS
                const MODEL_URL = './models'; 
                
                // Загружаем только необходимые модели для нахождения лиц
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                // Если нужны точки лица (для более точного фото)
                // await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL); 

                this.modelsLoaded = true;
                this.status.innerText = "";
                this.startCamera();
            } catch (err) {
                this.status.innerText = "❌ Ошибка загрузки моделей. Проверьте путь /models.";
                console.error(err);
                this.startBtn.disabled = false;
            }
        },

        /**
         * 2. Запуск камеры
         */
        async startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                this.video.srcObject = stream;
                
                this.mainMenu.style.display = 'none';
                this.camScreen.style.display = 'flex';

                // Ждем начала воспроизведения для настройки холста
                this.video.onplay = () => {
                    const displaySize = { width: this.video.videoWidth, height: this.video.videoHeight };
                    faceapi.matchDimensions(this.canvas, displaySize);
                    this.startDetection();
                };
            } catch (err) {
                this.mainMenu.style.display = 'block';
                this.camScreen.style.display = 'none';
                alert("❌ Нет доступа к камере.");
                console.error(err);
                this.startBtn.disabled = false;
            }
        },

        /**
         * 3. Петля обнаружения лиц
         */
        startDetection() {
            this.isDetecting = true;
            const displaySize = { width: this.video.videoWidth, height: this.video.videoHeight };
            
            // Запускаем выбор ученика через 5 секунд после начала обнаружения
            setTimeout(() => this.pickRandomStudent(), 5000);

            this.detectionLoop = setInterval(async () => {
                if (!this.isDetecting) return;

                // Находим все лица
                const detections = await faceapi.detectAllFaces(this.video, new faceapi.TinyFaceDetectorOptions());
                
                // Изменяем координаты под размер холста
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // Очищаем и рисуем квадраты
                this.canvas.getContext('2d').clearRect(0, 0, this.canvas.width, this.canvas.height);
                faceapi.draw.drawDetections(this.canvas, resizedDetections);
            }, 100); // Frame rate: 10fps
        },

        /**
         * 4. Логика рандомного выбора одного ученика
         */
        async pickRandomStudent() {
            this.isDetecting = false;
            clearInterval(this.detectionLoop);

            // Финальный скан, чтобы взять текущие координаты
            const detections = await faceapi.detectAllFaces(this.video, new faceapi.TinyFaceDetectorOptions());
            
            if (detections.length === 0) {
                alert("❌ Ученики не найдены. Попробуйте еще раз.");
                this.stopCamera();
                return;
            }

            // Выбираем рандомное лицо из массива detected
            const randomIndex = Math.floor(Math.random() * detections.length);
            const selectedFace = detections[randomIndex];
            
            this.zoomAndCapture(selectedFace);
        },

        /**
         * 5. Визуальный Зум (CSS) и Захват Фото (Canvas)
         */
        zoomAndCapture(faceData) {
            // КООРДИНАТЫ ЛИЦА
            const { x, y, width, height } = faceData.box;
            
            // 1. Применяем визуальный зум через CSS Transform к элементу VIDEO
            // Вычисляем, насколько нужно приблизить (в 3 раза или по ширине лица)
            const zoomScale = Math.max(2, this.video.videoWidth / (width * 1.5));
            
            // Вычисляем точку центра лица в процентах
            const centerX = ((x + width/2) / this.video.videoWidth) * 100;
            const centerY = ((y + height/2) / this.video.videoHeight) * 100;
            
            // CSS эффект: приближение к лицу
            this.video.style.transition = "transform 1.5s ease-in-out, transform-origin 1.5s ease-in-out";
            this.video.style.transformOrigin = `${centerX}% ${centerY}%`;
            this.video.style.transform = `scale(${zoomScale})`;
            this.canvas.style.display = 'none'; // Убираем квадраты

            // 2. Ждем окончания CSS анимации, затем делаем фото
            setTimeout(() => {
                this.takeFinalPhoto(faceData, zoomScale);
            }, 1600);
        },

        /**
         * 6. Съемка фото из холста и отображение результата
         */
        takeFinalPhoto(faceData, zoomScale) {
            // Создаем временный холст для "кропа" (обрезания) фото
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            
            // Делаем фото крупным: берем область лица + 30% запаса
            const cropWidth = faceData.box.width * 1.8;
            const cropHeight = faceData.box.height * 1.8;
            const cropX = faceData.box.x - (cropWidth - faceData.box.width) / 2;
            const cropY = faceData.box.y - (cropHeight - faceData.box.height) / 2;

            tempCanvas.width = cropWidth;
            tempCanvas.height = cropHeight;

            // Рисуем обрезанный кусок видео на временный холст
            // Аргументы: drawImage(source, sx, sy, sWidth, sHeight, dx, dy, dWidth, dHeight)
            ctx.drawImage(this.video, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
            
            // Конвертируем в Base64 для тега <img>
            const photoDataUrl = tempCanvas.toDataURL('image/png');
            
            this.photo.src = photoDataUrl;
            this.showResult();
        },

        showResult() {
            this.stopCamera();
            this.camScreen.style.display = 'none';
            this.resScreen.style.display = 'flex';
        },

        hideResult() {
            this.resScreen.style.display = 'none';
            this.mainMenu.style.display = 'block';
            this.photo.src = "";
            this.startBtn.disabled = false;
        },

        stopCamera() {
            if (this.video.srcObject) {
                this.video.srcObject.getTracks().forEach(track => track.stop());
                this.video.srcObject = null;
                // Сбрасываем зум
                this.video.style.transition = "none";
                this.video.style.transform = "scale(1)";
                this.canvas.style.display = 'block';
            }
        }
    };
</script>
</body>
</html>
