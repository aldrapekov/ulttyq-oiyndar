<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Қыз қуу</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgm" src="bgm.mp3" loop></audio>
    <div id="spinning-pattern"></div>
    
    <div id="rotate-screen" class="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <h2>Бұрыңыз / Поверните экран</h2>
    </div>

    <div id="kyzquu-screen" class="screen">
        <button class="home-btn" onclick="app.goHome()">🏠 Меню</button>
        
        <div class="arkan-layout">
            <div class="arkan-zone p1-color">
                <h2 id="kq-team-a">Игрок 1 (Жігіт)</h2>
                <div class="timer-container" id="kq-timer-box"><div class="timer-bar" id="kq-timer"></div></div>
                <div class="arkan-q-box" id="kq-q-a">?</div>
                <div class="arkan-options" id="kq-opt-a"></div>
            </div>
            
            <div class="arkan-arena" style="background: #e8f5e9; position: relative;">
                <div class="finish-line" style="position: absolute; right: 5%; top: 0; bottom: 0; width: 12px; background: repeating-linear-gradient(45deg, #000, #000 8px, #fff 8px, #fff 16px); z-index: 0; box-shadow: -2px 0 5px rgba(0,0,0,0.3);"></div>
                
                <img src="girl_horse.gif" id="kq-girl" onerror="this.src='horse.gif'" style="position: absolute; left: 30%; top: 30%; height: 80px; transition: left 0.4s ease-out; z-index: 1; object-fit: contain;">
                
                <img src="boy_horse.gif" id="kq-boy" onerror="this.src='horse.gif'" style="position: absolute; left: 5%; top: 55%; height: 95px; transition: left 0.3s ease-in; z-index: 2; object-fit: contain;">
            </div>

            <div class="arkan-zone p2-color">
                <h2 id="kq-team-b">Игрок 2 (Қыз)</h2>
                <div class="ai-status" id="kq-ai-status">🤖 Қыз қашып барады...</div>
                <div id="kq-p2-controls" style="display:flex; flex-direction:column; flex:1; justify-content: center;">
                    <div class="arkan-q-box" id="kq-q-b">?</div>
                    <div class="arkan-options" id="kq-opt-b"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="winner-text" style="color:var(--blue); font-size: 1.5rem; margin-bottom: 15px;">Победа!</h2>
            <button onclick="app.restartCurrentGame()" style="padding: 10px 20px; font-size: 1rem; background: var(--gold); border:none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px;">Рестарт</button>
            <button onclick="app.goHome()" style="padding: 10px 20px; font-size: 1rem; background: #eee; border: none; border-radius: 8px; cursor: pointer; width: 100%;">Меню</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
