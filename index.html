<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uly Dala Oyindary - Меню</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <audio id="bgm" src="bgm.mp3" loop></audio>
    <div id="spinning-pattern"></div>
    
    <div id="rotate-screen" class="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <h2>Бұрыңыз / Поверните экран</h2>
        <p>Ойын көлденең режимге арналған</p>
    </div>

    <div id="menu-screen" class="screen">
        <div class="menu-card">
            <h1 class="main-title">ULY DALA OYINDARY</h1>
            
            <div class="settings-row">
                <div>
                    <span class="label-text">Режим / Режим</span>
                    <select id="mode-select" onchange="app.saveSettings()">
                        <option value="pve">👤 Игрок vs 🤖 ИИ</option>
                        <option value="pvp">👥 Игрок vs Игрок</option>
                    </select>
                </div>
                <div>
                    <span class="label-text">Предмет / Пән</span>
                    <select id="subject-select" onchange="app.saveSettings()">
                        <option value="math" id="opt-math">Математика</option>
                        <option value="custom">✨ Свой тест (ИИ)</option>
                    </select>
                </div>
                <div>
                    <span class="label-text">Язык / Тіл</span>
                    <select id="lang-select" onchange="app.saveSettings()">
                        <option value="ru">Русский</option>
                        <option value="kz">Қазақша</option>
                    </select>
                </div>
                
                <div id="wrap-difficulty">
                    <span class="label-text">Сложность / Қиындық</span>
                    <select id="difficulty-select" onchange="app.saveSettings()">
                        <option value="easy">Легко (6с)</option>
                        <option value="medium">Средне (5с)</option>
                        <option value="hard">Сложно (4с)</option>
                        <option value="impossible">Невозможно (3с)</option>
                    </select>
                </div>
                <div id="wrap-players" style="display:none;">
                    <span class="label-text">Игроки (для Бәйге)</span>
                    <select id="players-select" onchange="app.saveSettings()">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
            </div>

            <div class="games-grid" id="games-container">
                <div class="game-card" onclick="app.startGame('arkan')">
                    <img src="arqan_i.png" class="game-img-icon" alt="Арқан">
                    <h3 id="txt-game1">Арқан Тартыс</h3>
                </div>
                <div class="game-card" onclick="app.startGame('baige')">
                    <img src="horse_i.png" class="game-img-icon" alt="Бәйге">
                    <h3 id="txt-game2">Бәйге</h3>
                </div>
                <div class="game-card" onclick="app.startGame('asyk')">
                    <img src="asyq.png" class="game-img-icon" alt="Асық">
                    <h3 id="txt-game3">Асық Ату</h3>
                </div>
                <div class="game-card" onclick="window.location.href='selector.html'">
                    <img src="camera_i.png" class="game-img-icon" alt="Камера">
                    <h3 id="txt-game4">Случайный ученик</h3>
                </div>
            </div>

            <button onclick="window.location.href='generator.html'" style="margin-top: 30px; width: 100%; padding: 15px; background: var(--gold); color: #333; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #d4b52b;">✨ Загрузить свой текст (ИИ)</button>
        </div>
    </div>

    <script src="app.js"></script> </body>
</html>
